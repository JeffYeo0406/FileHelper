services:
  - type: web
    name: simple-file-helper
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/seed.py && uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./file_helper.db
